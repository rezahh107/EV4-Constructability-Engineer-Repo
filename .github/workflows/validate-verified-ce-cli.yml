name: validate-verified-ce-cli

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact PR-head identity
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"
          printf 'tested_pr_head=%s\n' "$TESTED_SHA"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run documented official CLI on clean and dirty metadata states
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git switch -C ce-cli-validation "$EXPECTED_HEAD_SHA"
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          python scripts/validate-verified-ce-cli.py
