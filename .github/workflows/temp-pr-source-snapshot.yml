name: temporary-pr-source-snapshot

on:
  pull_request:
    paths:
      - '.github/workflows/temp-pr-source-snapshot.yml'
      - 'scripts/report-ce-model-trust-field-reduction.py'
      - 'tests/**'
      - 'validator/**'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install repository lint dependencies
        run: python -m pip install -q -e '.[dev]'

      - name: Repair only changed Python files
        run: |
          files=(
            scripts/report-ce-model-trust-field-reduction.py
            tests/test_ce_authority_mutation_harness.py
            tests/test_ce_claim_policy_and_model_reduction.py
            tests/test_ce_validation_transaction.py
            tests/test_ce_validation_transaction_rereview.py
            tests/test_project_gate_exporter.py
            tests/test_project_gate_exporter_cleanup_state.py
            tests/test_project_gate_exporter_post_merge_audit.py
            tests/test_verified_constructability_runtime.py
            tests/verified_exporter_test_support.py
            validator/__init__.py
            validator/authority_boundary.py
            validator/claim_policy_registry.py
            validator/verified_constructability.py
            validator/verified_project_gate_exporter.py
          )
          ruff check "${files[@]}" --fix --unsafe-fixes || true
          ruff format "${files[@]}"
          ruff check "${files[@]}" --fix --unsafe-fixes || true
          ruff check "${files[@]}" --output-format=concise > targeted-ruff-report.txt || true

      - name: Upload repaired source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr-source-repaired
          path: |
            targeted-ruff-report.txt
            scripts/report-ce-model-trust-field-reduction.py
            tests/test_ce_authority_mutation_harness.py
            tests/test_ce_claim_policy_and_model_reduction.py
            tests/test_ce_validation_transaction.py
            tests/test_ce_validation_transaction_rereview.py
            tests/test_project_gate_exporter.py
            tests/test_project_gate_exporter_cleanup_state.py
            tests/test_project_gate_exporter_post_merge_audit.py
            tests/test_verified_constructability_runtime.py
            tests/verified_exporter_test_support.py
            validator/__init__.py
            validator/authority_boundary.py
            validator/claim_policy_registry.py
            validator/verified_constructability.py
            validator/verified_project_gate_exporter.py
          retention-days: 1
