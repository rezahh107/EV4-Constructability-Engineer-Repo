name: validate-ce-runtime

on:
  pull_request:
    paths:
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: read

jobs:
  diagnose-focused-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Reproduce focused failures concisely
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth=1 \
            --branch agent/ce-intermediate-validation-carriers \
            "https://x-access-token:${GH_TOKEN}@github.com/rezahh107/EV4-Constructability-Engineer-Repo.git" repo
          cd repo
          git fetch --quiet origin main:refs/remotes/origin/main
          python - <<'PY'
          from pathlib import Path

          text = Path('.github/workflows/ce46-explicit-runtime-input-repair.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY", start)
          lines = text[start:end].splitlines()
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in lines
          ) + "\n"
          Path('/tmp/ce46_apply_repair.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/ce46_apply_repair.py
          git checkout origin/main -- .github/workflows/validate-ce-bootstrap.yml
          rm .github/workflows/ce46-explicit-runtime-input-repair.yml
          rm .github/workflows/ce46-explicit-runtime-input-repair-pr.yml
          python -m pip install -q -e '.[dev]' >/dev/null 2>&1
          set +e
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q --tb=no \
            tests/test_ce_exporter_explicit_inputs.py \
            tests/test_ce_intermediate_export_transaction.py \
            tests/test_project_gate_exporter.py \
            tests/test_ce_validation_transaction.py \
            tests/test_intermediate_carriers.py \
            tests/test_intermediate_carriers_authority.py \
            > /tmp/ce46-focused.log 2>&1
          status=$?
          set -e
          tail -n 80 /tmp/ce46-focused.log
          exit "$status"
