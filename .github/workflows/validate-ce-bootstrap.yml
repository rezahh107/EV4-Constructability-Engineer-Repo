name: validate-ce-runtime

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'README.md'
      - 'STATUS.md'
      - 'manifests/ce-conversation-bootstrap.v1.json'
      - 'manifests/ce_pipeline_manifest.v1.json'
      - 'schemas/ce-conversation-bootstrap.v1.schema.json'
      - 'schemas/ce_architect_stage_intake.v1.schema.json'
      - 'schemas/ce_architect_stage_intake.v1_1.schema.json'
      - 'scripts/check-ce-bootstrap.py'
      - 'scripts/ce_bootstrap_spec.py'
      - 'scripts/ce_bootstrap_snapshot.py'
      - 'scripts/ce_bootstrap_validation.py'
      - 'scripts/ce_bootstrap_routing.py'
      - 'scripts/ce_bootstrap_test_support.py'
      - 'scripts/validate-ce-architect-stage-intake.py'
      - 'tests/test_ce_bootstrap_semantics.py'
      - 'tests/test_ce_architect_stage_intake.py'
      - 'tests/test_strategy_batch_gates.py'
      - 'tests/test_ce_builder_producer_contract.py'
      - 'tests/test_project_gate_exporter.py'
      - 'tests/test_ce_validation_transaction.py'
      - 'validator/**'
      - 'release/EV4_CE_PROJECT_RELEASE_PACK_v1/PROJECT_INSTRUCTIONS.md'
      - 'release/EV4_CE_PROJECT_RELEASE_PACK_v1/EV4_FIRST_RUN_GUIDE.md'
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install -e '.[dev]'

      - name: Validate lean CE runtime contract
        run: python scripts/check-ce-bootstrap.py

      - name: Run CE runtime routing tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_bootstrap_semantics.py

      - name: Validate official Architect-stage intake
        run: |
          python scripts/validate-ce-architect-stage-intake.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_architect_stage_intake.py

      - name: Verify Builder eligibility guards
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q \
            tests/test_strategy_batch_gates.py \
            tests/test_ce_builder_producer_contract.py

      - name: Verify deterministic and atomic export
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q \
            tests/test_project_gate_exporter.py \
            tests/test_ce_validation_transaction.py

      - name: Validate behavioral coverage and role boundaries
        run: |
          python scripts/validate-behavioral-rule-coverage.py
          python scripts/validate-role-alignment-fixtures.py
          python scripts/validate-project-gate-producer-adoption.py

      - name: Run repository regression suite
        run: pytest -q

      - name: Verify reference paradigm lock
        run: npm run test:reference-paradigm-lock
