name: Apply CE46 final regression fixes

on:
  push:
    branches:
      - agent/ce-intermediate-validation-carriers

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply final focused regression fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"expected one match in {path}, observed {text.count(old)}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "tests/test_ce_intermediate_export_transaction.py",
              '''    assert "CE_STRATEGY_COVERAGE_PACKAGE_SCHEMA_VALIDATION_FAILED" in {
                  item.code for item in result.diagnostics
              }
          ''',
              '''    assert "CE_INTERMEDIATE_PAYLOAD_SCHEMA_INVALID" in {
                  item.code for item in result.diagnostics
              }
          ''',
          )

          replace_once(
              "tests/test_ce_validation_transaction_rereview.py",
              '''from exporter_test_support import (
              ROOT,
          ''',
              '''from exporter_test_support import (
              INTERMEDIATE_INPUTS_FILENAME,
              ROOT,
          ''',
          )
          replace_once(
              "tests/test_ce_validation_transaction_rereview.py",
              '''        changed_payload = load_json(payload_path)
                  changed_payload["payload_identity"]["run_id"] = "ce-run-test-restoration-failure"
                  _write_json(payload_path, changed_payload)
          ''',
              '''        changed_payload = load_json(payload_path)
                  changed_run_id = "ce-run-test-restoration-failure"
                  changed_payload["payload_identity"]["run_id"] = changed_run_id
                  _write_json(payload_path, changed_payload)
                  sidecar_path = intake_path.with_name(INTERMEDIATE_INPUTS_FILENAME)
                  sidecar = load_json(sidecar_path)
                  sidecar["run_id"] = changed_run_id
                  _write_json(sidecar_path, sidecar)
          ''',
          )
          replace_once(
              "tests/test_ce_validation_transaction_rereview.py",
              '''        changed_payload = load_json(payload_path)
                  changed_payload["payload_identity"]["run_id"] = "ce-run-test-replacement"
                  _write_json(payload_path, changed_payload)
                  second = export_file(
          ''',
              '''        changed_payload = load_json(payload_path)
                  changed_run_id = "ce-run-test-replacement"
                  changed_payload["payload_identity"]["run_id"] = changed_run_id
                  _write_json(payload_path, changed_payload)
                  sidecar_path = intake_path.with_name(INTERMEDIATE_INPUTS_FILENAME)
                  sidecar = load_json(sidecar_path)
                  sidecar["run_id"] = changed_run_id
                  _write_json(sidecar_path, sidecar)
                  second = export_file(
          ''',
          )
          PY

          git show d9d28b06813da0263a2cdfec721fb46a5b47816a:.github/workflows/validate-ce-bootstrap.yml > .github/workflows/validate-ce-bootstrap.yml
          python -m py_compile validator/engine.py validator/intermediate_carriers*.py tests/test_ce_intermediate_export_transaction.py tests/test_ce_validation_transaction_rereview.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix CE intermediate regression expectations"
          git push origin HEAD:${{ github.ref_name }}
