name: validate-ce-runtime

on:
  pull_request:
    paths:
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: read

jobs:
  diagnose-repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/ce-intermediate-validation-carriers
          fetch-depth: 1
          show-progress: false
          persist-credentials: false

      - name: Extract and run repair script
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          text = Path('.github/workflows/ce46-explicit-runtime-input-repair.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY", start)
          Path('/tmp/ce46_apply_repair.py').write_text(
              textwrap.dedent(text[start:end]),
              encoding='utf-8',
          )
          PY
          python /tmp/ce46_apply_repair.py
