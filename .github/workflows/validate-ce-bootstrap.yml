name: Apply CE46 validator alignment

on:
  push:
    branches:
      - agent/ce-intermediate-validation-carriers

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Align official CE validation and focused mutations
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"expected one match in {path}, observed {text.count(old)}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "validator/engine.py",
              '''SCHEMA_BY_KIND = {
              "constructability_review": "schemas/constructability_review.schema.json",
              "implementation_strategy_map": "schemas/implementation_strategy_map.schema.json",
              "builder_executable_package": "schemas/builder_executable_package.schema.json",
          }
          REFERENCE_PARADIGM_SCHEMA = "schemas/reference-paradigm-lock.schema.json"
          ''',
              '''SCHEMA_BY_KIND = {
              "constructability_review": "schemas/constructability_review.schema.json",
              "implementation_strategy_map": "schemas/implementation_strategy_map.schema.json",
              "builder_executable_package": "schemas/builder_executable_package.schema.json",
          }
          DOCUMENT_SCHEMA_BY_ID = {
              "ev4-ce-stage-payload@1.0.0": "schemas/ce_stage_payload.v1.schema.json",
          }
          REFERENCE_PARADIGM_SCHEMA = "schemas/reference-paradigm-lock.schema.json"
          ''',
          )
          replace_once(
              "validator/engine.py",
              '''    errors: list[str] = []

              for key, schema_path in SCHEMA_BY_KIND.items():
                  if key not in document:
                      continue
                  schema = load_json(root / schema_path)
                  errors.extend(_collect_schema_errors(schema, document[key], key))
          ''',
              '''    errors: list[str] = []

              document_schema_path = DOCUMENT_SCHEMA_BY_ID.get(document.get("schema_id"))
              if document_schema_path:
                  schema = load_json(root / document_schema_path)
                  errors.extend(_collect_schema_errors(schema, document, "document"))

              for key, schema_path in SCHEMA_BY_KIND.items():
                  if key not in document or document[key] is None:
                      continue
                  schema = load_json(root / schema_path)
                  errors.extend(_collect_schema_errors(schema, document[key], key))
          ''',
          )

          replace_once(
              "tests/test_intermediate_carriers.py",
              '''    values["final_payload"]["builder_executable_package"] = copy.deepcopy(package)
              result = evaluate(values)
              assert result["builder_ready"] is False
              assert "CE_STRATEGY_COVERAGE_PACKAGE_SCHEMA_VALIDATION_FAILED" in code_set(result)
          ''',
              '''    result = evaluate(values)
              assert result["builder_ready"] is False
              assert "CE_STRATEGY_COVERAGE_PACKAGE_SCHEMA_VALIDATION_FAILED" in code_set(result)


          def test_same_invalid_package_in_raw_and_payload_hits_official_payload_validation():
              values = transaction_inputs()
              values["builder_executable_package"].pop("package_id")
              values["final_payload"]["builder_executable_package"] = copy.deepcopy(
                  values["builder_executable_package"]
              )
              result = evaluate(values)
              assert result["transaction_status"] == "invalid"
              assert result["fidelity_passed"] is False
              assert result["builder_ready"] is False
              assert "CE_INTERMEDIATE_PAYLOAD_SCHEMA_INVALID" in code_set(result)
          ''',
          )
          replace_once(
              "tests/test_intermediate_carriers.py",
              '''    values["constructability_review"]["constructability_status"] = "blocked"
              values["implementation_strategy_map"] = None
          ''',
              '''    values["constructability_review"]["constructability_status"] = "blocked"
              values["constructability_review"]["reviewed_nodes"][0]["node_status"] = "blocked"
              values["implementation_strategy_map"] = None
          ''',
          )
          replace_once(
              "tests/test_intermediate_carriers.py",
              '''    values["constructability_review"]["constructability_status"] = "needs_user_evidence"
              values["implementation_strategy_map"] = None
          ''',
              '''    values["constructability_review"]["constructability_status"] = "needs_user_evidence"
              values["constructability_review"]["reviewed_nodes"][0]["node_status"] = "needs_user_evidence"
              values["implementation_strategy_map"] = None
          ''',
          )

          replace_once(
              "tests/test_intermediate_carriers_authority.py",
              '''def test_same_invalid_package_in_raw_and_payload_is_not_builder_ready(mutation):
          ''',
              '''def test_raw_invalid_package_is_not_builder_ready(mutation):
          ''',
          )
          replace_once(
              "tests/test_intermediate_carriers_authority.py",
              '''    values["final_payload"]["builder_executable_package"] = copy.deepcopy(package)
              result = evaluate_ce_intermediate_validation(**values)
              assert result["builder_ready"] is False
              assert "CE_STRATEGY_COVERAGE_PACKAGE_SCHEMA_VALIDATION_FAILED" in codes(result)
          ''',
              '''    result = evaluate_ce_intermediate_validation(**values)
              assert result["builder_ready"] is False
              assert "CE_STRATEGY_COVERAGE_PACKAGE_SCHEMA_VALIDATION_FAILED" in codes(result)


          def test_same_invalid_package_in_raw_and_payload_uses_official_payload_diagnostic():
              values = transaction_inputs()
              values["builder_executable_package"].pop("package_id")
              values["final_payload"]["builder_executable_package"] = copy.deepcopy(
                  values["builder_executable_package"]
              )
              result = evaluate_ce_intermediate_validation(**values)
              assert result["transaction_status"] == "invalid"
              assert result["fidelity_passed"] is False
              assert result["builder_ready"] is False
              assert "CE_INTERMEDIATE_PAYLOAD_SCHEMA_INVALID" in codes(result)
          ''',
          )
          PY

          git show d9d28b06813da0263a2cdfec721fb46a5b47816a:.github/workflows/validate-ce-bootstrap.yml > .github/workflows/validate-ce-bootstrap.yml
          python -m py_compile validator/engine.py validator/intermediate_carriers*.py tests/test_intermediate_carriers.py tests/test_intermediate_carriers_authority.py
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for name in (
              "schemas/ce_stage_payload.v1.schema.json",
              "schemas/builder_executable_package.schema.json",
              "schemas/ce_intermediate_export_inputs.v1.schema.json",
              "schemas/ce_intermediate_validation_carriers.v1.schema.json",
          ):
              Draft202012Validator.check_schema(json.loads(Path(name).read_text(encoding="utf-8")))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Align official CE payload validation"
          git push origin HEAD:${{ github.ref_name }}
