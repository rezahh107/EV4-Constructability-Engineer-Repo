name: validate-ce-bootstrap

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'README.md'
      - 'STATUS.md'
      - 'manifests/ce-conversation-bootstrap.v1.json'
      - 'manifests/ce_pipeline_manifest.v1.json'
      - 'schemas/ce-conversation-bootstrap.v1.schema.json'
      - 'schemas/ce_architect_stage_intake.v1.schema.json'
      - 'schemas/ce_architect_stage_intake.v1_1.schema.json'
      - 'scripts/check-ce-bootstrap.py'
      - 'scripts/validate-ce-architect-stage-intake.py'
      - 'tests/test_ce_bootstrap_semantics.py'
      - 'tests/test_ce_architect_stage_intake.py'
      - 'release/EV4_CE_PROJECT_RELEASE_PACK_v1/PROJECT_INSTRUCTIONS.md'
      - 'release/EV4_CE_PROJECT_RELEASE_PACK_v1/EV4_FIRST_RUN_GUIDE.md'
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact PR-head identity
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$REVIEWED_HEAD_SHA"
          cat > ce-bootstrap-exact-head-receipt.json <<EOF
          {
            "tested_ref_type": "pull_request_head",
            "tested_sha": "$TESTED_SHA",
            "reviewed_head_sha": "$REVIEWED_HEAD_SHA",
            "exact_head_match": true,
            "synthetic_merge": false,
            "workflow": "validate-ce-bootstrap",
            "run_id": "${GITHUB_RUN_ID}",
            "job": "${GITHUB_JOB}"
          }
          EOF
          cat ce-bootstrap-exact-head-receipt.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install -e '.[dev]'

      - name: Validate CE bootstrap semantics
        run: python scripts/check-ce-bootstrap.py

      - name: Run CE bootstrap mutation tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_bootstrap_semantics.py

      - name: Validate official CE Architect-stage intake fixtures
        run: python scripts/validate-ce-architect-stage-intake.py

      - name: Run focused official CE intake tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_architect_stage_intake.py

      - name: Validate behavioral rule coverage
        run: python scripts/validate-behavioral-rule-coverage.py

      - name: Validate role-alignment fixtures
        run: python scripts/validate-role-alignment-fixtures.py

      - name: Validate Project Gate producer adoption
        run: python scripts/validate-project-gate-producer-adoption.py

      - name: Record completed AI governance validation sequence
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/validate-ai-governance.py \
            --head-sha "$REVIEWED_HEAD_SHA" \
            --pr-number "$PR_NUMBER" \
            --record-ci-context .governance-ci-context.json

      - name: Generate exact-head AI governance evidence
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/validate-ai-governance.py \
            --head-sha "$REVIEWED_HEAD_SHA" \
            --pr-number "$PR_NUMBER" \
            --ci-context .governance-ci-context.json \
            --emit-dir .governance-evidence

      - name: Upload CE bootstrap exact-head receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ce-bootstrap-exact-head-receipt-${{ github.event.pull_request.head.sha }}
          path: ce-bootstrap-exact-head-receipt.json
          if-no-files-found: error
          retention-days: 30
