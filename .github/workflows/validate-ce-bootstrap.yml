name: validate-ce-runtime

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch exact PR head with low-noise Git
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git init -q
          git remote add origin https://github.com/${{ github.repository }}
          git fetch -q --depth=1 origin "$EXPECTED_HEAD_SHA"
          git checkout -q --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"

      - name: Diagnose first full-suite regression
        run: |
          python -m pip install -q -e '.[dev]'
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q --tb=short --maxfail=1
