name: validate-ce-runtime

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'README.md'
      - 'STATUS.md'
      - 'manifests/ce-conversation-bootstrap.v1.json'
      - 'manifests/ce_pipeline_manifest.v1.json'
      - 'schemas/ce-conversation-bootstrap.v1.schema.json'
      - 'schemas/ce_architect_stage_intake.v1.schema.json'
      - 'schemas/ce_architect_stage_intake.v1_1.schema.json'
      - 'scripts/check-ce-bootstrap.py'
      - 'scripts/ce_bootstrap_spec.py'
      - 'scripts/ce_bootstrap_snapshot.py'
      - 'scripts/ce_bootstrap_validation.py'
      - 'scripts/ce_bootstrap_routing.py'
      - 'scripts/ce_bootstrap_test_support.py'
      - 'scripts/validate-ce-architect-stage-intake.py'
      - 'tests/test_ce_bootstrap_semantics.py'
      - 'tests/test_ce_runtime_balanced_repairs.py'
      - 'tests/test_validate_fixtures_workflow_policy.py'
      - 'tests/test_ce_architect_stage_intake.py'
      - 'tests/test_strategy_batch_gates.py'
      - 'tests/test_ce_builder_producer_contract.py'
      - 'tests/test_project_gate_exporter.py'
      - 'tests/test_ce_validation_transaction.py'
      - 'validator/**'
      - 'release/EV4_CE_PROJECT_RELEASE_PACK_v1/PROJECT_INSTRUCTIONS.md'
      - 'release/EV4_CE_PROJECT_RELEASE_PACK_v1/EV4_FIRST_RUN_GUIDE.md'
      - '.github/workflows/validate-ce-bootstrap.yml'
      - '.github/workflows/validate-fixtures.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact PR-head identity
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"
          printf 'tested_pr_head=%s\n' "$TESTED_SHA"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install -e '.[dev]'

      - name: Validate lean CE runtime contract
        run: python scripts/check-ce-bootstrap.py

      - name: Run CE runtime routing tests
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q \
            tests/test_ce_bootstrap_semantics.py \
            tests/test_ce_runtime_balanced_repairs.py

      - name: Validate official Architect-stage intake
        run: |
          python scripts/validate-ce-architect-stage-intake.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_architect_stage_intake.py

      - name: Verify Builder eligibility guards
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q \
            tests/test_strategy_batch_gates.py \
            tests/test_ce_builder_producer_contract.py

      - name: Verify deterministic and atomic export
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q \
            tests/test_project_gate_exporter.py \
            tests/test_ce_validation_transaction.py

      - name: Verify workflow policy
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_validate_fixtures_workflow_policy.py

      - name: Validate behavioral coverage and role boundaries
        run: |
          python scripts/validate-behavioral-rule-coverage.py
          python scripts/validate-role-alignment-fixtures.py
          python scripts/validate-project-gate-producer-adoption.py

      - name: Verify reference paradigm lock
        run: npm run test:reference-paradigm-lock

      - name: Run repository regression suite
        run: pytest -q

  repair-explicit-runtime-inputs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/ce-intermediate-validation-carriers
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Apply repair and restore final workflow set
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/ce46-explicit-runtime-input-repair.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY", start)
          Path('/tmp/ce46_apply_repair.py').write_text(
              textwrap.dedent(text[start:end]),
              encoding='utf-8',
          )
          PY
          python /tmp/ce46_apply_repair.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/validate-ce-bootstrap.yml
          rm .github/workflows/ce46-explicit-runtime-input-repair.yml
          rm .github/workflows/ce46-explicit-runtime-input-repair-pr.yml

      - name: Install validation dependencies
        run: |
          python -m pip install -e '.[dev]'
          npm install --ignore-scripts

      - name: Validate Python and JSON Schemas
        run: |
          python -m py_compile \
            validator/project_gate_exporter.py \
            validator/ce_validation_transaction.py \
            validator/project_gate_exporter_core.py \
            validator/project_gate_exporter_build.py \
            tests/test_ce_exporter_explicit_inputs.py
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for name in (
              'schemas/ce_stage_payload.v1.schema.json',
              'schemas/builder_executable_package.schema.json',
              'schemas/ce_intermediate_export_inputs.v1.schema.json',
              'schemas/ce_intermediate_validation_carriers.v1.schema.json',
          ):
              Draft202012Validator.check_schema(json.loads(Path(name).read_text(encoding='utf-8')))
              print(f'schema_ok={name}')
          PY

      - name: Run focused exporter tests
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_exporter_explicit_inputs.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_intermediate_export_transaction.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_project_gate_exporter.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_validation_transaction.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_intermediate_carriers.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_intermediate_carriers_authority.py

      - name: Validate documented CLI with explicit input
        run: |
          python - <<'PY'
          import shutil
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('tests').resolve()))
          from exporter_test_support import ROOT, _payload, _real_source_pair, _write_json

          target = ROOT / '.tmp-cli-validation'
          shutil.rmtree(target, ignore_errors=True)
          target.mkdir(parents=True)
          intake, _, intake_path, source_path = _real_source_pair(target)
          _write_json(target / 'ce-stage-payload.json', _payload(intake, intake_path))
          PY
          ev4-ce-project-gate-export \
            --repo-root . \
            --payload .tmp-cli-validation/ce-stage-payload.json \
            --source-intake .tmp-cli-validation/ce-input.json \
            --source-bundle .tmp-cli-validation/architect-source-bundle.json \
            --intermediate-inputs .tmp-cli-validation/ce-intermediate-export-inputs.json \
            --output .tmp-cli-validation/ce-project-gate.json \
            > .tmp-cli-validation/result.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('.tmp-cli-validation/result.json').read_text(encoding='utf-8'))
          assert result['status'] == 'successful', result
          assert result['handoff_allowed'] is True, result
          assert result['authorization_valid'] is True, result
          print('cli_status=successful')
          print('cli_repository_dirty=', result['repository_dirty'])
          PY
          rm -rf .tmp-cli-validation

      - name: Run full repository validation
        run: |
          pytest -q
          python scripts/validate-behavioral-rule-coverage.py
          python scripts/validate-role-alignment-fixtures.py
          python scripts/validate-project-gate-producer-adoption.py
          npm run test:reference-paradigm-lock

      - name: Commit verified repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: make CE exporter runtime inputs explicit'
          git push origin HEAD:agent/ce-intermediate-validation-carriers
