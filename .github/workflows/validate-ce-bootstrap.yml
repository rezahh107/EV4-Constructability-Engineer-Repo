name: validate-ce-runtime

on:
  pull_request:
    paths:
      - 'validator/**'
      - 'tests/**'
      - 'schemas/**'
      - 'contracts/**'
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Run concise exact-head regression diagnostic
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/rezahh107/EV4-Constructability-Engineer-Repo/zipball/$EXPECTED_HEAD_SHA" \
            -o /tmp/repo.zip
          mkdir /tmp/repo
          unzip -q /tmp/repo.zip -d /tmp/repo
          cd "$(find /tmp/repo -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          python -m pip install -q -e '.[dev]' >/dev/null 2>&1
          set +e
          pytest -q --tb=no > /tmp/ce46-pytest.log 2>&1
          status=$?
          set -e
          tail -n 55 /tmp/ce46-pytest.log
          exit "$status"
