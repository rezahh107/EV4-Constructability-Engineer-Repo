name: validate-ce-runtime

on:
  pull_request:
    paths:
      - '.github/workflows/validate-ce-bootstrap.yml'

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/ce-intermediate-validation-carriers
          fetch-depth: 0
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Apply repair and restore final workflow set
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path('.github/workflows/ce46-explicit-runtime-input-repair.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY", start)
          lines = text[start:end].splitlines()
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in lines
          ) + "\n"
          Path('/tmp/ce46_apply_repair.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/ce46_apply_repair.py
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_ce_exporter_explicit_inputs.py')
          text = path.read_text(encoding='utf-8')
          old = '''    def fake_run(command: list[str], cwd: Path) -> subprocess.CompletedProcess[str]:
        assert command == ["git", "symbolic-ref", "--quiet", "--short", "HEAD"]
        return subprocess.CompletedProcess(command, 0, "feature/explicit-inputs\\n", "")

    monkeypatch.setattr(core_module, "_git", fake_git)
'''
          new = '''    original_run = core_module._run

    def fake_run(command: list[str], cwd: Path) -> subprocess.CompletedProcess[str]:
        if command == ["git", "symbolic-ref", "--quiet", "--short", "HEAD"]:
            return subprocess.CompletedProcess(command, 0, "feature/explicit-inputs\\n", "")
        return original_run(command, cwd)

    monkeypatch.setattr(core_module, "_git", fake_git)
'''
          if text.count(old) != 1:
              raise SystemExit('expected dirty metadata test mock was not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git checkout origin/main -- .github/workflows/validate-ce-bootstrap.yml
          rm .github/workflows/ce46-explicit-runtime-input-repair.yml
          rm .github/workflows/ce46-explicit-runtime-input-repair-pr.yml

      - name: Install validation dependencies
        run: |
          python -m pip install -e '.[dev]'
          npm install --ignore-scripts

      - name: Validate Python and JSON Schemas
        run: |
          python -m py_compile \
            validator/project_gate_exporter.py \
            validator/ce_validation_transaction.py \
            validator/project_gate_exporter_core.py \
            validator/project_gate_exporter_build.py \
            tests/test_ce_exporter_explicit_inputs.py
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for name in (
              'schemas/ce_stage_payload.v1.schema.json',
              'schemas/builder_executable_package.schema.json',
              'schemas/ce_intermediate_export_inputs.v1.schema.json',
              'schemas/ce_intermediate_validation_carriers.v1.schema.json',
          ):
              Draft202012Validator.check_schema(json.loads(Path(name).read_text(encoding='utf-8')))
              print(f'schema_ok={name}')
          PY

      - name: Run focused exporter tests
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_exporter_explicit_inputs.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_intermediate_export_transaction.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_project_gate_exporter.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_validation_transaction.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_intermediate_carriers.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_intermediate_carriers_authority.py

      - name: Validate documented CLI with explicit input
        run: |
          python - <<'PY'
          import shutil
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('tests').resolve()))
          from exporter_test_support import ROOT, _payload, _real_source_pair, _write_json

          target = ROOT / '.tmp-cli-validation'
          shutil.rmtree(target, ignore_errors=True)
          target.mkdir(parents=True)
          intake, _, intake_path, source_path = _real_source_pair(target)
          _write_json(target / 'ce-stage-payload.json', _payload(intake, intake_path))
          PY
          ev4-ce-project-gate-export \
            --repo-root . \
            --payload .tmp-cli-validation/ce-stage-payload.json \
            --source-intake .tmp-cli-validation/ce-input.json \
            --source-bundle .tmp-cli-validation/architect-source-bundle.json \
            --intermediate-inputs .tmp-cli-validation/ce-intermediate-export-inputs.json \
            --output .tmp-cli-validation/ce-project-gate.json \
            > .tmp-cli-validation/result.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('.tmp-cli-validation/result.json').read_text(encoding='utf-8'))
          assert result['status'] == 'successful', result
          assert result['handoff_allowed'] is True, result
          assert result['authorization_valid'] is True, result
          print('cli_status=successful')
          print('cli_repository_dirty=', result['repository_dirty'])
          PY
          rm -rf .tmp-cli-validation

      - name: Run full repository validation
        run: |
          pytest -q
          python scripts/validate-behavioral-rule-coverage.py
          python scripts/validate-role-alignment-fixtures.py
          python scripts/validate-project-gate-producer-adoption.py
          npm run test:reference-paradigm-lock

      - name: Commit verified repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: make CE exporter runtime inputs explicit'
          git push origin HEAD:agent/ce-intermediate-validation-carriers
