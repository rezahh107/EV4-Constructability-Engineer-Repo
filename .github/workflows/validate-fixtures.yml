name: validate-fixtures

on:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head for bounded repair
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
      - name: Assert exact PR-head identity
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$REVIEWED_HEAD_SHA"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install repair and repository dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML jsonschema pytest
          python -m pip install -e '.[dev]'
      - name: Extract and execute deterministic repair block with captured diagnostics
        shell: bash
        run: |
          set +e
          rm -f policies/.repair-debug.txt
          python - <<'PY'
          from pathlib import Path
          raw = Path('.github/workflows/temporary-repair-policy.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = raw.index(marker)
          end_marker = "\n          PY\n"
          end = raw.index(end_marker, start) + len(end_marker)
          segment = raw[start:end]
          block = ''.join(line[10:] if line.startswith('          ') else line for line in segment.splitlines(keepends=True))
          Path('/tmp/ce-policy-repair.sh').write_text(block, encoding='utf-8')
          PY
          EXTRACT_STATUS=$?
          if [ "$EXTRACT_STATUS" -ne 0 ]; then
            printf 'extract_status=%s\n' "$EXTRACT_STATUS" > policies/.repair-debug.txt
            exit 0
          fi
          bash /tmp/ce-policy-repair.sh > /tmp/ce-policy-repair.log 2>&1
          REPAIR_STATUS=$?
          if [ "$REPAIR_STATUS" -ne 0 ]; then
            {
              printf 'repair_status=%s\n' "$REPAIR_STATUS"
              tail -n 200 /tmp/ce-policy-repair.log
            } > policies/.repair-debug.txt
          fi
          exit 0
      - name: Run focused policy governance validation when repair succeeded
        shell: bash
        run: |
          if [ -f policies/.repair-debug.txt ]; then
            echo 'Repair failed; focused validation deferred.'
            exit 0
          fi
          python scripts/validate-ce-policy-governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_policy_governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_decision_escape_routes_schema.py
      - name: Restore canonical workflow when repair succeeded
        shell: bash
        run: |
          if [ -f policies/.repair-debug.txt ]; then
            echo 'Repair failed; canonical workflow restoration deferred.'
            exit 0
          fi
          git show 6650c31304e5a0472b276c36018c1df8f42ac983:.github/workflows/validate-fixtures.yml > /tmp/validate-fixtures.base.yml
          python - <<'PY'
          from pathlib import Path
          source = Path('/tmp/validate-fixtures.base.yml').read_text(encoding='utf-8')
          needle = '      - run: python scripts/validate-ce-decision-lineage-sequence.py\n'
          addition = '''      - name: Validate manual CE policy governance fixtures\n        run: python scripts/validate-ce-policy-governance.py\n      - name: Run focused CE policy governance tests\n        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_policy_governance.py\n'''
          if addition not in source:
              source = source.replace(needle, needle + addition)
          Path('.github/workflows/validate-fixtures.yml').write_text(source, encoding='utf-8')
          PY
      - name: Commit repair result or captured diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'policy-repair-bot'
          git config user.email 'policy-repair-bot@users.noreply.github.com'
          if [ -f policies/.repair-debug.txt ]; then
            git add policies/.repair-debug.txt
            git commit -m '[policy-repair-debug] Capture CE repair failure'
            git push origin HEAD:policy/ce-constructability-policy-r001
            exit 0
          fi
          rm -f .github/workflows/temporary-repair-policy.yml
          rm -f .github/workflows/temporary-repair-bootstrap.yml
          rm -f policies/.repair-trigger
          git add -A
          git commit -m '[policy-repair-bot] Repair CE policy governance findings'
          git push origin HEAD:policy/ce-constructability-policy-r001
