name: validate-fixtures

on:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head for bounded repair
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
      - name: Assert exact PR-head identity
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$REVIEWED_HEAD_SHA"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install repair and repository dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML jsonschema pytest
          python -m pip install -e '.[dev]'
      - name: Extract and execute deterministic repair block
        shell: bash
        run: |
          set +e
          rm -f policies/.repair-debug.txt
          python - <<'PY'
          from pathlib import Path
          raw = Path('.github/workflows/temporary-repair-policy.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = raw.index(marker)
          end_marker = "\n          PY\n"
          end = raw.index(end_marker, start) + len(end_marker)
          segment = raw[start:end]
          block = ''.join(line[10:] if line.startswith('          ') else line for line in segment.splitlines(keepends=True))
          Path('/tmp/ce-policy-repair.sh').write_text(block, encoding='utf-8')
          PY
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            printf 'extract_status=%s\n' "$STATUS" > policies/.repair-debug.txt
            exit 0
          fi
          bash /tmp/ce-policy-repair.sh > /tmp/ce-policy-repair.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            { printf 'repair_status=%s\n' "$STATUS"; tail -n 250 /tmp/ce-policy-repair.log; } > policies/.repair-debug.txt
          fi
          exit 0
      - name: Repair focused test module loading
        shell: bash
        run: |
          if [ -f policies/.repair-debug.txt ]; then exit 0; fi
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_ce_policy_governance.py')
          text = path.read_text(encoding='utf-8')
          old = '''import importlib.util\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nMODULE_PATH = ROOT / "scripts" / "validate-ce-policy-governance.py"\nspec = importlib.util.spec_from_file_location("ce_policy_governance", MODULE_PATH)\nmodule = importlib.util.module_from_spec(spec)\nassert spec and spec.loader\nspec.loader.exec_module(module)\n'''
          new = '''import importlib.util\nimport sys\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nMODULE_PATH = ROOT / "scripts" / "validate-ce-policy-governance.py"\nspec = importlib.util.spec_from_file_location("ce_policy_governance", MODULE_PATH)\nassert spec and spec.loader\nmodule = importlib.util.module_from_spec(spec)\nsys.modules[spec.name] = module\nspec.loader.exec_module(module)\n'''
          if old not in text:
              raise SystemExit('expected test import block not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Run focused validation and capture result
        shell: bash
        run: |
          if [ -f policies/.repair-debug.txt ]; then exit 0; fi
          set +e
          {
            python scripts/validate-ce-policy-governance.py
            PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_policy_governance.py
            PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_decision_escape_routes_schema.py
          } > /tmp/validation.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            { printf 'focused_validation_status=%s\n' "$STATUS"; tail -n 300 /tmp/validation.log; } > policies/.repair-debug.txt
          else
            cat /tmp/validation.log
          fi
          exit 0
      - name: Commit repair carriers or diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git checkout ${{ github.event.pull_request.head.sha }} -- .github/workflows/validate-fixtures.yml
          git config user.name 'policy-repair-bot'
          git config user.email 'policy-repair-bot@users.noreply.github.com'
          if [ -f policies/.repair-debug.txt ]; then
            git add policies/.repair-debug.txt
            git commit -m '[policy-repair-debug] Capture CE policy validation failure'
            git push origin HEAD:policy/ce-constructability-policy-r001
            exit 0
          fi
          git add AGENTS.md \
            policies/EV4_CE_CONSTRUCTABILITY_DECISION_POLICY_r001.md \
            planning/DECISION_ESCAPE_ROUTES.yml \
            schemas/ce_policy_decision_context.v1.schema.json \
            scripts/validate-ce-policy-governance.py \
            fixtures/ce-policy-governance \
            tests/test_ce_policy_governance.py
          git commit -m '[policy-repair-bot] Repair CE policy governance findings'
          git push origin HEAD:policy/ce-constructability-policy-r001
