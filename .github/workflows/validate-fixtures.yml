name: validate-fixtures

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact PR-head identity
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"
          printf 'tested_pr_head=%s\n' "$TESTED_SHA"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Regression J
        run: python -c "import pathlib,subprocess,sys; f=[str(p) for p in pathlib.Path('tests').glob('test_j*.py')]; sys.exit(subprocess.call(['pytest','-q',*f]))"

      - name: Regression K
        run: python -c "import pathlib,subprocess,sys; f=[str(p) for p in pathlib.Path('tests').glob('test_k*.py')]; sys.exit(subprocess.call(['pytest','-q',*f]))"

      - name: Regression L
        run: python -c "import pathlib,subprocess,sys; f=[str(p) for p in pathlib.Path('tests').glob('test_l*.py')]; sys.exit(subprocess.call(['pytest','-q',*f]))"

      - name: Validate behavioral and role boundaries
        run: |
          python scripts/validate-behavioral-rule-coverage.py
          python scripts/validate-role-alignment-fixtures.py
          python scripts/validate-ce-architect-stage-intake.py
          python scripts/validate-ce-decision-lineage-sequence.py
          python scripts/validate-ce-policy-governance.py
          python scripts/validate-ce-kernel-decision-receipts.py
          python scripts/validate-project-gate-producer-adoption.py

      - name: Verify reference paradigm lock
        run: npm run test:reference-paradigm-lock
