name: validate-fixtures

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact PR-head identity
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TESTED_SHA="$(git rev-parse HEAD)"
          test "$TESTED_SHA" = "$REVIEWED_HEAD_SHA"
          cat > exact-head-validation-receipt.json <<EOF
          {
            "tested_ref_type": "pull_request_head",
            "tested_sha": "$TESTED_SHA",
            "reviewed_head_sha": "$REVIEWED_HEAD_SHA",
            "exact_head_match": true,
            "synthetic_merge": false,
            "workflow": "validate-fixtures",
            "run_id": "${GITHUB_RUN_ID}",
            "job": "${GITHUB_JOB}"
          }
          EOF
          cat exact-head-validation-receipt.json
          {
            echo "### Exact-head validation identity"
            echo '```json'
            cat exact-head-validation-receipt.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Run focused CE Project Gate exporter tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_project_gate_exporter.py
      - name: Run focused cleanup-state and status-history tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_project_gate_exporter_cleanup_state.py
      - name: Run focused CE-02 post-merge exporter regressions
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_project_gate_exporter_post_merge_audit.py
      - name: Run CE validation-transaction mutation tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_validation_transaction.py
      - name: Run PR Inspector rereview mutations
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_validation_transaction_rereview.py
      - run: pytest -q --junitxml=pytest-report.xml
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytest-report-${{ github.event.pull_request.head.sha }}
          path: pytest-report.xml
          if-no-files-found: error
          retention-days: 30
      - run: python scripts/validate-behavioral-rule-coverage.py
      - run: python scripts/validate-role-alignment-fixtures.py
      - run: npm run test:reference-paradigm-lock
      - run: python scripts/validate-ce-architect-stage-intake.py
      - run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_architect_stage_intake.py
      - run: python scripts/validate-ce-decision-lineage-sequence.py
      - name: Validate manual CE policy governance fixtures
        run: python scripts/validate-ce-policy-governance.py
      - name: Run focused CE policy governance tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_policy_governance.py
      - run: python scripts/validate-ce-kernel-decision-receipts.py
      - run: python scripts/validate-project-gate-producer-adoption.py
      - name: Record completed AI governance validation sequence
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/validate-ai-governance.py \
            --head-sha "$REVIEWED_HEAD_SHA" \
            --pr-number "$PR_NUMBER" \
            --record-ci-context .governance-ci-context.json
      - name: Generate exact-head AI governance evidence
        env:
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/validate-ai-governance.py \
            --head-sha "$REVIEWED_HEAD_SHA" \
            --pr-number "$PR_NUMBER" \
            --ci-context .governance-ci-context.json \
            --emit-dir .governance-evidence
      - name: Upload exact-head AI governance evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ai-governance-evidence-${{ github.event.pull_request.head.sha }}
          path: .governance-evidence/*.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
      - name: Upload exact-head validation receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exact-head-validation-receipt-${{ github.event.pull_request.head.sha }}
          path: exact-head-validation-receipt.json
          if-no-files-found: error
          retention-days: 30
