name: diagnose-ce-full-regression

on:
  pull_request:
    paths:
      - 'validator/**'
      - 'tests/**'
      - '.github/workflows/diagnose-ce-full-regression.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      EXACT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Run concise exact-head full-regression diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git init repo >/dev/null
          git -C repo remote add origin https://github.com/${{ github.repository }}.git
          git -C repo fetch --depth=1 origin "$EXACT_HEAD_SHA" >/dev/null 2>&1
          git -C repo checkout --detach FETCH_HEAD >/dev/null 2>&1
          test "$(git -C repo rev-parse HEAD)" = "$EXACT_HEAD_SHA"
          cd repo
          python -m pip install -q -e '.[dev]' >/dev/null 2>&1
          set +e
          pytest -q > /tmp/pytest.out 2>&1
          status=$?
          set -e
          tail -n 100 /tmp/pytest.out
          exit "$status"
