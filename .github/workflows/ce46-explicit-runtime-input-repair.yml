name: ce46-explicit-runtime-input-repair

on:
  push:
    branches:
      - 'agent/ce-intermediate-validation-carriers'
    paths:
      - '.github/workflows/ce46-explicit-runtime-input-repair.yml'

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/ce-intermediate-validation-carriers
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Apply bounded repair
        run: |
          python - <<'PY'
          from __future__ import annotations

          import ast
          import re
          from pathlib import Path

          ROOT = Path.cwd()

          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              (ROOT / path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one replacement target, found {count}: {old[:80]!r}")
              write(path, text.replace(old, new, 1))

          exporter = "validator/project_gate_exporter.py"
          replace_once(
              exporter,
              """    source_intake_path: Path,\n    source_bundle_path: Path,\n    output_path: Path,\n""",
              """    source_intake_path: Path,\n    source_bundle_path: Path,\n    intermediate_inputs_path: Path,\n    output_path: Path,\n""",
          )
          replace_once(
              exporter,
              """        resolved_source_bundle = _resolve_input_path(\n            source_bundle_path,\n            \"Architect source bundle\",\n        )\n        safe_output = _safe_output_path(\n""",
              """        resolved_source_bundle = _resolve_input_path(\n            source_bundle_path,\n            \"Architect source bundle\",\n        )\n        resolved_intermediate_inputs = _resolve_input_path(\n            intermediate_inputs_path,\n            \"CE intermediate validation inputs\",\n        )\n        safe_output = _safe_output_path(\n""",
          )
          replace_once(
              exporter,
              """                resolved_payload,\n                resolved_source_intake,\n                resolved_source_bundle,\n            ),\n""",
              """                resolved_payload,\n                resolved_source_intake,\n                resolved_source_bundle,\n                resolved_intermediate_inputs,\n            ),\n""",
          )
          replace_once(
              exporter,
              """                resolved_payload,\n                resolved_source_intake,\n                resolved_source_bundle,\n                safe_output,\n""",
              """                resolved_payload,\n                resolved_source_intake,\n                resolved_source_bundle,\n                resolved_intermediate_inputs,\n                safe_output,\n""",
          )
          replace_once(
              exporter,
              """            source_intake_path=resolved_source_intake,\n            source_bundle_path=resolved_source_bundle,\n            output_path=safe_output,\n""",
              """            source_intake_path=resolved_source_intake,\n            source_bundle_path=resolved_source_bundle,\n            intermediate_inputs_path=resolved_intermediate_inputs,\n            output_path=safe_output,\n""",
          )
          replace_once(
              exporter,
              """    parser.add_argument(\n        \"--source-bundle\",\n        required=True,\n        type=Path,\n        help=\"Architect Stage Evidence Bundle used to verify intake source binding.\",\n    )\n    parser.add_argument(\n        \"--output\",\n""",
              """    parser.add_argument(\n        \"--source-bundle\",\n        required=True,\n        type=Path,\n        help=\"Architect Stage Evidence Bundle used to verify intake source binding.\",\n    )\n    parser.add_argument(\n        \"--intermediate-inputs\",\n        required=True,\n        type=Path,\n        help=(\n            \"Independent CE intermediate-input artifact containing the current \"\n            \"constructability review, Implementation Strategy Map, and Builder \"\n            \"Executable Package.\"\n        ),\n    )\n    parser.add_argument(\n        \"--output\",\n""",
          )
          replace_once(
              exporter,
              """        source_intake_path=args.source_intake,\n        source_bundle_path=args.source_bundle,\n        output_path=args.output,\n""",
              """        source_intake_path=args.source_intake,\n        source_bundle_path=args.source_bundle,\n        intermediate_inputs_path=args.intermediate_inputs,\n        output_path=args.output,\n""",
          )

          transaction = "validator/ce_validation_transaction.py"
          replace_once(
              transaction,
              'INTERMEDIATE_INPUTS_FILENAME = "ce-intermediate-export-inputs.json"\n',
              "",
          )
          replace_once(
              transaction,
              """def _intermediate_inputs_path(source_intake_path: Path) -> Path:\n    return source_intake_path.with_name(INTERMEDIATE_INPUTS_FILENAME)\n\n\n""",
              "",
          )
          replace_once(
              transaction,
              """    source_intake_path: Path,\n    source_bundle_path: Path,\n    output_path: Path,\n    provenance: GitProvenance,\n""",
              """    source_intake_path: Path,\n    source_bundle_path: Path,\n    intermediate_inputs_path: Path,\n    output_path: Path,\n    provenance: GitProvenance,\n""",
          )
          replace_once(
              transaction,
              """    intermediate_path = _intermediate_inputs_path(source_intake_path)\n    if output_path.resolve(strict=False) == intermediate_path.resolve(strict=False):\n        raise ExporterError(\n            ExportDiagnostic(\n                \"CE_EXPORT_OUTPUT_ALIASES_INPUT\",\n                \"output_safety\",\n                \"Output path must not alias the intermediate input artifact.\",\n                str(output_path),\n                \"repository_owner\",\n            )\n        )\n\n""",
              "",
          )
          replace_once(
              transaction,
              "intermediate_snapshot = capture_json_snapshot(intermediate_path, label=\"independent CE intermediate inputs\",",
              "intermediate_snapshot = capture_json_snapshot(intermediate_inputs_path, label=\"independent CE intermediate inputs\",",
          )
          replace_once(
              transaction,
              """        path=intermediate_path,\n        repo_root=repo_root,\n""",
              """        path=intermediate_inputs_path,\n        repo_root=repo_root,\n""",
          )
          replace_once(
              transaction,
              "handoff_diagnostics = _handoff_diagnostics(payload, intake, source_bundle, provenance)",
              "handoff_diagnostics = _handoff_diagnostics(payload, intake, source_bundle)",
          )

          build = "validator/project_gate_exporter_build.py"
          replace_once(
              build,
              """def _handoff_diagnostics(\n    payload: dict[str, Any],\n    intake: dict[str, Any],\n    source_bundle: dict[str, Any],\n    provenance: GitProvenance,\n) -> list[ExportDiagnostic]:\n""",
              """def _handoff_diagnostics(\n    payload: dict[str, Any],\n    intake: dict[str, Any],\n    source_bundle: dict[str, Any],\n) -> list[ExportDiagnostic]:\n""",
          )
          replace_once(
              build,
              """    if provenance.dirty:\n        diagnostics.append(\n            ExportDiagnostic(\n                \"CE_EXPORT_DIRTY_WORKTREE_BLOCKS_HANDOFF\",\n                \"git_provenance\",\n                \"Dirty repository state blocks an allowed handoff.\",\n                \"$.producer.commit_sha\",\n                \"repository_owner\",\n            )\n        )\n""",
              "",
          )

          def add_explicit_input_to_export_calls(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              tree = ast.parse(text)
              lines = text.splitlines(keepends=True)
              inserts: list[tuple[int, str]] = []
              for node in ast.walk(tree):
                  if not isinstance(node, ast.Call):
                      continue
                  name = (
                      node.func.id
                      if isinstance(node.func, ast.Name)
                      else node.func.attr
                      if isinstance(node.func, ast.Attribute)
                      else None
                  )
                  if name != "export_file":
                      continue
                  if any(keyword.arg == "intermediate_inputs_path" for keyword in node.keywords):
                      continue
                  intake_keyword = next(
                      (keyword for keyword in node.keywords if keyword.arg == "source_intake_path"),
                      None,
                  )
                  output_keyword = next(
                      (keyword for keyword in node.keywords if keyword.arg == "output_path"),
                      None,
                  )
                  if intake_keyword is None or output_keyword is None:
                      raise SystemExit(f"{path}: export_file call lacks source_intake_path/output_path")
                  intake_expr = ast.get_source_segment(text, intake_keyword.value)
                  if not intake_expr:
                      raise SystemExit(f"{path}: could not recover source_intake_path expression")
                  line_index = output_keyword.value.lineno - 1
                  indent = re.match(r"\s*", lines[line_index]).group(0)
                  inserts.append(
                      (
                          line_index,
                          f'{indent}intermediate_inputs_path={intake_expr}.with_name("ce-intermediate-export-inputs.json"),\n',
                      )
                  )
              for line_index, insertion in sorted(inserts, reverse=True):
                  lines.insert(line_index, insertion)
              if inserts:
                  updated = "".join(lines)
                  ast.parse(updated)
                  path.write_text(updated, encoding="utf-8")

          def add_explicit_input_to_cli_calls(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              tree = ast.parse(text)
              lines = text.splitlines(keepends=True)
              inserts: list[tuple[int, str]] = []
              for node in ast.walk(tree):
                  if not isinstance(node, ast.Call):
                      continue
                  if not (
                      isinstance(node.func, ast.Attribute)
                      and isinstance(node.func.value, ast.Name)
                      and node.func.value.id == "exporter_module"
                      and node.func.attr == "main"
                      and node.args
                      and isinstance(node.args[0], ast.List)
                  ):
                      continue
                  elements = node.args[0].elts
                  constants = [element.value if isinstance(element, ast.Constant) else None for element in elements]
                  if "--intermediate-inputs" in constants:
                      continue
                  if "--source-intake" not in constants or "--output" not in constants:
                      continue
                  intake_index = constants.index("--source-intake") + 1
                  output_index = constants.index("--output")
                  intake_value = elements[intake_index]
                  intake_expr = None
                  if (
                      isinstance(intake_value, ast.Call)
                      and isinstance(intake_value.func, ast.Name)
                      and intake_value.func.id == "str"
                      and intake_value.args
                  ):
                      intake_expr = ast.get_source_segment(text, intake_value.args[0])
                  if not intake_expr:
                      raise SystemExit(f"{path}: unsupported CLI source-intake expression")
                  output_element = elements[output_index]
                  line_index = output_element.lineno - 1
                  indent = re.match(r"\s*", lines[line_index]).group(0)
                  inserts.append(
                      (
                          line_index,
                          f'{indent}"--intermediate-inputs",\n{indent}str({intake_expr}.with_name("ce-intermediate-export-inputs.json")),\n',
                      )
                  )
              for line_index, insertion in sorted(inserts, reverse=True):
                  lines.insert(line_index, insertion)
              if inserts:
                  updated = "".join(lines)
                  ast.parse(updated)
                  path.write_text(updated, encoding="utf-8")

          for test_path in sorted((ROOT / "tests").glob("test_*.py")):
              add_explicit_input_to_export_calls(test_path)
              add_explicit_input_to_cli_calls(test_path)

          dirty_test = ROOT / "tests/test_project_gate_exporter.py"
          dirty_text = dirty_test.read_text(encoding="utf-8")
          pattern = re.compile(
              r"def test_dirty_live_checkout_cannot_authorize_handoff\([\s\S]*?\n\n\ndef test_source_intake_hash_mismatch_produces_no_output",
          )
          replacement = '''def test_dirty_live_checkout_is_metadata_only_and_allows_handoff(
              tmp_path: Path,
              monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              observed = _provenance(dirty=True)
              monkeypatch.setattr(
                  exporter_module,
                  "inspect_git_provenance",
                  lambda repo_root, ignored_paths=(): observed,
              )
              intake, _, intake_path, source_path = _real_source_pair(tmp_path)
              payload_path = _write_json(tmp_path / "ce-stage-payload.json", _payload(intake, intake_path))
              output_path = ROOT / ".tmp-test-output" / "ce-project-gate.json"
              _cleanup_output(output_path)
              try:
                  result = export_file(
                      repo_root=ROOT,
                      payload_path=payload_path,
                      source_intake_path=intake_path,
                      source_bundle_path=source_path,
                      intermediate_inputs_path=intake_path.with_name("ce-intermediate-export-inputs.json"),
                      output_path=output_path,
                  )
                  assert result.status == "successful", result.as_dict()
                  assert result.output_written is True
                  assert result.handoff_allowed is True
                  assert result.summary["authorization_valid"] is True
                  assert result.summary["repository_dirty"] is True
                  assert result.summary["dirty_paths"] == list(observed.dirty_paths)
                  export = load_json(output_path)
                  assert export["handoff"]["allowed"] is True
                  assert "CE_EXPORT_DIRTY_WORKTREE_BLOCKS_HANDOFF" not in {
                      item["code"] for item in export["handoff"]["blocking_diagnostics"]
                  }
              finally:
                  _cleanup_output(output_path)



def test_source_intake_hash_mismatch_produces_no_output'''
          updated_dirty, count = pattern.subn(replacement, dirty_text, count=1)
          if count != 1:
              raise SystemExit(f"failed to replace dirty authorization test: {count}")
          ast.parse(updated_dirty)
          dirty_test.write_text(updated_dirty, encoding="utf-8")

          new_tests = r'''from __future__ import annotations

import inspect
import json
import subprocess
from pathlib import Path

import pytest

import validator.project_gate_exporter as exporter_module
import validator.project_gate_exporter_core as core_module
from validator.ce_validation_transaction import secure_build_export
from validator.project_gate_exporter import ExportResult, export_file
from exporter_test_support import (
    INTERMEDIATE_INPUTS_FILENAME,
    ROOT,
    _payload,
    _provenance,
    _real_source_pair,
    _write_json,
)


@pytest.fixture(autouse=True)
def live_provenance_boundary(monkeypatch: pytest.MonkeyPatch) -> None:
    monkeypatch.setattr(
        exporter_module,
        "inspect_git_provenance",
        lambda repo_root, ignored_paths=(): _provenance(),
    )


def _fixture_paths(tmp_path: Path) -> tuple[Path, Path, Path, Path]:
    intake, _, intake_path, source_path = _real_source_pair(tmp_path)
    payload_path = _write_json(
        tmp_path / "ce-stage-payload.json",
        _payload(intake, intake_path),
    )
    intermediate_path = intake_path.with_name(INTERMEDIATE_INPUTS_FILENAME)
    return payload_path, intake_path, source_path, intermediate_path


def _cleanup(path: Path) -> None:
    path.unlink(missing_ok=True)
    parent = path.parent
    if parent.name in {".tmp-test-output", ".tmp-test-input"} and parent.exists() and not any(parent.iterdir()):
        parent.rmdir()


def test_public_python_signatures_require_explicit_intermediate_input() -> None:
    export_signature = inspect.signature(export_file)
    secure_signature = inspect.signature(secure_build_export)
    assert export_signature.parameters["intermediate_inputs_path"].default is inspect.Parameter.empty
    assert secure_signature.parameters["intermediate_inputs_path"].default is inspect.Parameter.empty
    assert list(export_signature.parameters) == [
        "repo_root",
        "payload_path",
        "source_intake_path",
        "source_bundle_path",
        "intermediate_inputs_path",
        "output_path",
        "overwrite",
    ]


def test_cli_requires_intermediate_inputs() -> None:
    with pytest.raises(SystemExit) as exc_info:
        exporter_module.main(
            [
                "--payload",
                "payload.json",
                "--source-intake",
                "intake.json",
                "--source-bundle",
                "bundle.json",
            ]
        )
    assert exc_info.value.code == 2


def test_cli_passes_supplied_intermediate_path_without_pre_resolution(
    monkeypatch: pytest.MonkeyPatch,
    capsys: pytest.CaptureFixture[str],
) -> None:
    observed: dict[str, object] = {}

    def fake_export_file(**kwargs: object) -> ExportResult:
        observed.update(kwargs)
        return ExportResult(
            status="successful",
            output_path="ce-project-gate.json",
            output_written=True,
            handoff_allowed=True,
            diagnostics=(),
            summary={"authorization_valid": True},
        )

    monkeypatch.setattr(exporter_module, "export_file", fake_export_file)
    supplied = Path("relative/runtime/custom-intermediate.json")
    exit_code = exporter_module.main(
        [
            "--payload",
            "payload.json",
            "--source-intake",
            "intake.json",
            "--source-bundle",
            "bundle.json",
            "--intermediate-inputs",
            str(supplied),
            "--output",
            "ce-project-gate.json",
        ]
    )
    assert exit_code == 0
    assert observed["intermediate_inputs_path"] == supplied
    assert json.loads(capsys.readouterr().out)["status"] == "successful"


def test_custom_intermediate_filename_and_directory_succeeds_without_sibling_discovery(
    tmp_path: Path,
) -> None:
    payload_path, intake_path, source_path, hidden_path = _fixture_paths(tmp_path)
    custom_path = tmp_path / "operator-selected" / "current-ce-runtime-inputs.json"
    custom_path.parent.mkdir(parents=True)
    hidden_path.replace(custom_path)
    assert not hidden_path.exists()
    output_path = ROOT / ".tmp-test-output" / "custom-intermediate-path.json"
    _cleanup(output_path)
    try:
        result = export_file(
            repo_root=ROOT,
            payload_path=payload_path,
            source_intake_path=intake_path,
            source_bundle_path=source_path,
            intermediate_inputs_path=custom_path,
            output_path=output_path,
        )
        assert result.status == "successful", result.as_dict()
        assert result.handoff_allowed is True
        assert result.summary["authorization_valid"] is True
    finally:
        _cleanup(output_path)


def test_missing_supplied_intermediate_input_returns_structured_failure(tmp_path: Path) -> None:
    payload_path, intake_path, source_path, _ = _fixture_paths(tmp_path)
    missing_path = tmp_path / "operator-selected" / "missing.json"
    output_path = ROOT / ".tmp-test-output" / "missing-explicit-intermediate.json"
    _cleanup(output_path)
    result = export_file(
        repo_root=ROOT,
        payload_path=payload_path,
        source_intake_path=intake_path,
        source_bundle_path=source_path,
        intermediate_inputs_path=missing_path,
        output_path=output_path,
    )
    assert result.status == "invalid"
    assert result.output_written is False
    assert result.handoff_allowed is False
    assert result.diagnostics[0].code == "CE_EXPORT_INTERMEDIATE_INPUTS_READ_FAILED"
    assert not output_path.exists()


def test_output_cannot_alias_explicit_intermediate_input(tmp_path: Path) -> None:
    payload_path, intake_path, source_path, hidden_path = _fixture_paths(tmp_path)
    protected_path = ROOT / ".tmp-test-input" / "explicit-intermediate.json"
    _cleanup(protected_path)
    protected_path.parent.mkdir(parents=True, exist_ok=True)
    protected_path.write_bytes(hidden_path.read_bytes())
    try:
        result = export_file(
            repo_root=ROOT,
            payload_path=payload_path,
            source_intake_path=intake_path,
            source_bundle_path=source_path,
            intermediate_inputs_path=protected_path,
            output_path=protected_path,
            overwrite=True,
        )
        assert result.status == "invalid"
        assert result.output_written is False
        assert result.handoff_allowed is False
        assert result.diagnostics[0].code == "CE_EXPORT_OUTPUT_ALIASES_INPUT"
    finally:
        _cleanup(protected_path)


def test_realistic_dirty_git_metadata_is_diagnostic_only(
    tmp_path: Path,
    monkeypatch: pytest.MonkeyPatch,
) -> None:
    payload_path, intake_path, source_path, intermediate_path = _fixture_paths(tmp_path)
    output_path = ROOT / ".tmp-test-output" / "realistic-dirty-metadata.json"
    _cleanup(output_path)

    def fake_git(repo_root: Path, *args: str) -> str:
        commands = {
            ("rev-parse", "--show-toplevel"): str(ROOT),
            ("remote", "get-url", "origin"): "https://github.com/rezahh107/EV4-Constructability-Engineer-Repo.git",
            ("rev-parse", "HEAD"): "1234567890abcdef1234567890abcdef12345678",
            ("status", "--porcelain=v1", "--untracked-files=all"): " M docs/unrelated.md\n?? scratch/unrelated.txt",
        }
        return commands[args]

    def fake_run(command: list[str], cwd: Path) -> subprocess.CompletedProcess[str]:
        assert command == ["git", "symbolic-ref", "--quiet", "--short", "HEAD"]
        return subprocess.CompletedProcess(command, 0, "feature/explicit-inputs\n", "")

    monkeypatch.setattr(core_module, "_git", fake_git)
    monkeypatch.setattr(core_module, "_run", fake_run)
    monkeypatch.setattr(exporter_module, "inspect_git_provenance", core_module.inspect_git_provenance)
    try:
        result = export_file(
            repo_root=ROOT,
            payload_path=payload_path,
            source_intake_path=intake_path,
            source_bundle_path=source_path,
            intermediate_inputs_path=intermediate_path,
            output_path=output_path,
        )
        assert result.status == "successful", result.as_dict()
        assert result.handoff_allowed is True
        assert result.summary["authorization_valid"] is True
        assert result.summary["repository_dirty"] is True
        assert result.summary["dirty_paths"] == ["docs/unrelated.md", "scratch/unrelated.txt"]
        assert "CE_EXPORT_DIRTY_WORKTREE_BLOCKS_HANDOFF" not in {
            diagnostic.code for diagnostic in result.diagnostics
        }
    finally:
        _cleanup(output_path)


def test_documented_commands_expose_explicit_intermediate_input() -> None:
    document = (ROOT / "docs/CE_PROJECT_GATE_EXPORTER.md").read_text(encoding="utf-8")
    assert document.count("--intermediate-inputs") >= 2
    assert "dirty checkout is reported as metadata and does not affect functional authorization" in document
'''
          write("tests/test_ce_exporter_explicit_inputs.py", new_tests)

          doc_path = "docs/CE_PROJECT_GATE_EXPORTER.md"
          doc = read(doc_path)
          doc = doc.replace(
              "  --source-bundle path/to/architect-stage-bundle.json \\\n  --output ce-project-gate.json",
              "  --source-bundle path/to/architect-stage-bundle.json \\\n  --intermediate-inputs path/to/ce-intermediate-export-inputs.json \\\n  --output ce-project-gate.json",
          )
          doc = doc.replace(
              "`--source-bundle` must point to the actual source bundle object whose canonical JSON hash is declared by `project_gate_transition.source_bundle_hash`. A metadata wrapper around the bundle is not accepted as the source bundle itself.",
              "`--source-bundle` must point to the actual source bundle object whose canonical JSON hash is declared by `project_gate_transition.source_bundle_hash`. A metadata wrapper around the bundle is not accepted as the source bundle itself. `--intermediate-inputs` is a required explicit path; no sibling filename or directory convention is used as authority.",
          )
          start = doc.index("## Validation order")
          end = doc.index("## Provenance and determinism")
          validation_section = '''## Validation order

```text
protected repository and operator-input path resolution
→ explicit intermediate-input path resolution
→ optional Git metadata inspection
→ exact snapshots of Payload, intake, source bundle, and intermediate inputs
→ private temporary copies of the captured intake and source-bundle bytes
→ official Architect-intake and source-bundle validation
→ intermediate-input Schema and run-ID validation
→ authoritative composite Carrier evaluation
→ official final CE validation
→ Carrier-derived Stage Manifest construction
→ deterministic Producer Gate Export validation
→ atomic write
→ post-write byte, Schema, semantic, transaction, and identity revalidation
→ invalid-output removal or explicit persistence reporting
```

Invalid semantic input, source-binding mismatch, input read failure, malformed or mismatched intermediate input, private-snapshot lifecycle failure, or mutation of any captured transaction input produces no new output.

A valid but blocked, insufficient-evidence, or synthetic run may produce a diagnostic Gate-ready artifact with `handoff.allowed: false`. A dirty checkout is reported as metadata and does not affect functional authorization.

'''
          doc = doc[:start] + validation_section + doc[end:]
          doc = doc.replace(
              "The public/operator `export_file` path always derives repository identity, named Git ref, exact `HEAD`, and dirty state from the live checkout. It has no caller-supplied provenance parameter, environment override, or alternate operator bypass. An unknown repository, wrong `origin`, detached `HEAD`, missing Git metadata, or dirty checkout fails closed or blocks handoff according to the documented policy.",
              "The public/operator `export_file` path derives repository identity, named Git ref, exact `HEAD`, and dirty state from the live checkout for reporting. It has no caller-supplied provenance parameter. Dirty state is metadata only: it does not change fidelity, Builder readiness, `handoff.allowed`, exporter status, or exit code. Existing repository identity and Git availability checks remain reporting-boundary prerequisites in this bounded repair.",
          )
          doc = doc.replace(
              "Payload, source-intake, and source-bundle resolution also occurs inside the exporter boundary.",
              "Payload, source-intake, source-bundle, and intermediate-input resolution also occurs inside the exporter boundary.",
          )
          doc = doc.replace(
              "producer_ref\nhandoff_target",
              "producer_ref\nrepository_dirty\ndirty_paths\nhandoff_target",
          )
          write(doc_path, doc)

          contract_path = "contracts/CE_INTERMEDIATE_VALIDATION_CARRIERS_V1.md"
          contract = read(contract_path)
          section_start = contract.index("## Official producer integration")
          section_end = contract.index("## Common carrier envelope")
          producer_section = '''## Official producer integration

The authoritative CE producer transaction requires the operator to supply the independent intermediate artifact explicitly through both public surfaces:

```python
def export_file(
    *,
    repo_root: Path,
    payload_path: Path,
    source_intake_path: Path,
    source_bundle_path: Path,
    intermediate_inputs_path: Path,
    output_path: Path,
    overwrite: bool = False,
) -> ExportResult:
    ...
```

```text
--intermediate-inputs path/to/current-ce-intermediate-inputs.json
```

No sibling filename, intake-directory adjacency, alternate search path, or silent fallback participates in authority. The supplied artifact retains this repository-owned identity:

```yaml
schema_id: ev4-ce-intermediate-export-inputs@1.0.0
schema_version: 1.0.0
run_id: <same run_id as final Payload>
constructability_review: {}
implementation_strategy_map: {} | null
builder_executable_package: {} | null
```

These values must be independent CE runtime outputs. The producer must not reconstruct them from the final Payload immediately before evaluation.

The exporter resolves all four public inputs once, protects the output from aliasing any of them, snapshots their exact bytes independently, and rechecks byte stability before publication. Before Stage Manifest construction it:

1. verifies the source intake and source bundle;
2. validates the explicit intermediate artifact and run identity;
3. runs `evaluate_ce_intermediate_validation(...)`;
4. requires successful fidelity;
5. runs the existing official final CE validation transaction;
6. derives intermediate Stage Manifest status and output hashes from internally derived carriers;
7. permits Builder handoff only when the composite result is Builder-ready and all functional export gates pass.

A missing, changed, malformed, run-mismatched, or Payload-inconsistent intermediate input artifact fails closed before publication. Git dirty state is retained only in result metadata and never authorizes or blocks the transaction.

'''
          contract = contract[:section_start] + producer_section + contract[section_end:]
          write(contract_path, contract)

          # Static guardrails for the bounded change.
          for path in [
              "validator/project_gate_exporter.py",
              "validator/ce_validation_transaction.py",
              "validator/project_gate_exporter_build.py",
          ]:
              ast.parse(read(path))
          if "CE_EXPORT_DIRTY_WORKTREE_BLOCKS_HANDOFF" in read("validator/project_gate_exporter_build.py"):
              raise SystemExit("dirty-worktree blocking diagnostic remains in handoff code")
          if "_intermediate_inputs_path" in read("validator/ce_validation_transaction.py"):
              raise SystemExit("hidden intermediate sibling resolver remains")
          PY

      - name: Install validation dependencies
        run: |
