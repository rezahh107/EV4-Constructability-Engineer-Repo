name: temporary-repair-bootstrap

on:
  push:
    branches:
      - policy/ce-constructability-policy-r001

permissions:
  contents: write

jobs:
  repair:
    if: ${{ !contains(github.event.head_commit.message, '[policy-repair-bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: policy/ce-constructability-policy-r001
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install repair dependencies
        run: python -m pip install PyYAML jsonschema pytest
      - name: Extract and execute deterministic repair block
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          data = yaml.safe_load(Path('.github/workflows/temporary-repair-policy.yml').read_text(encoding='utf-8'))
          steps = data['jobs']['repair']['steps']
          block = next(step['run'] for step in steps if step.get('name') == 'Repair policy governance deterministically')
          Path('/tmp/ce-policy-repair.sh').write_text(block, encoding='utf-8')
          PY
          bash /tmp/ce-policy-repair.sh
      - name: Run focused policy governance validation
        shell: bash
        run: |
          python -m pip install -e '.[dev]'
          python scripts/validate-ce-policy-governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ce_policy_governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_decision_escape_routes_schema.py
      - name: Commit repaired policy and governance carriers
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/temporary-repair-policy.yml
          rm -f .github/workflows/temporary-repair-bootstrap.yml
          rm -f policies/.repair-trigger
          git config user.name 'policy-repair-bot'
          git config user.email 'policy-repair-bot@users.noreply.github.com'
          git add -A
          git commit -m '[policy-repair-bot] Repair CE policy governance findings'
          git push origin HEAD:policy/ce-constructability-policy-r001
